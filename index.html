            --text-color: #f5f5f5;

            --primary-color: #52b202;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --form-bg: #f9f9f9;
            --input-border: #cccccc;

            color: var(--text-color);

            padding: 80px 20px 20px 20px; /* Padding atas ditambah untuk navbar */

            left: 0;
            width: 100%;

            align-items: center;
            padding: 15px 25px;
            box-sizing: border-box;
            background-color: var(--card-bg);

        .nav-left, .nav-right {

            align-items: center;
            gap: 15px;
        }

        /* Hamburger Menu */
        .hamburger {

            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;

        .hamburger div {

            font-size: 22px;
            cursor: pointer;
            color: var(--text-color);
            padding: 0;
            transition: transform 0.3s ease;
        }
        .theme-toggle-btn:hover {

        }

        /* Language Select */

            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;

        /* --- STYLING LOADING SCREEN --- */
        #preloader {

            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            margin-bottom: 25px;

        .spinner {

            border: 5px solid var(--input-border);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;

            100% { transform: rotate(360deg); }

        /* Teks Bahasa Inggris di Loading Pertama */

            font-weight: bold;
            letter-spacing: 1.5px;

        .side-menu-content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }

            justify-content: center;

            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));

            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .radio-box {
            background-color: var(--form-bg);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;

            justify-content: center;

        .radio-box input { display: none; }

        .radio-box:has(input:checked) {

        .payment-logo { width: 40px; height: 40px; margin-bottom: 5px; object-fit: contain; }

        .modal-overlay {

            background: var(--modal-overlay); display: none; justify-content: center;
            align-items: center; z-index: 1000; overflow-y: auto;

            border: 1px solid var(--primary-color);

        .close-btn {
            position: absolute; top: 10px; right: 15px; font-size: 24px;
            cursor: pointer; color: var(--text-color); font-weight: bold;
            transition: color 0.3s ease;
        }
        
        .close-btn:hover {
            color: #ff5252;
        }
    </style>
</head>

                navigator.clipboard.writeText(nomorDana).then(() => {
                    alert(langData[currentLang].alertCopyDana + nomorDana);
                }).catch(err => {
                    fallbackCopyTextToClipboard(nomorDana);
                });
            } else {
                fallbackCopyTextToClipboard(nomorDana);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert(langData[currentLang].alertCopyDana + text);
            } catch (err) {
                alert(langData[currentLang].alertCopyFail + text);
            }
            document.body.removeChild(textArea);
        }

        async function downloadQR() {
            const response = await fetch(linkQRIS);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'QRIS_HANZ_STORE.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }

        function bukaPembayaran(isLangRefresh = false) {
            const login = document.querySelector('input[name="loginMethod"]:checked');
            const kat = document.querySelector('input[name="kategori"]:checked');
            const nom = document.querySelector('input[name="nominal"]:checked');
            const pay = document.querySelector('input[name="pembayaran"]:checked');
            const inputLoginId = document.getElementById("loginId").value.trim();
            const inputLoginPass = document.getElementById("loginPass").value.trim();

            if (!isLangRefresh) {
                // Validasi apakah form sudah terisi semua
                if (!login || !kat || !nom || !pay || !inputLoginId || !inputLoginPass) {
                    alert(langData[currentLang].alertEmpty); return;
                }

                // Validasi Khusus jika memilih kategori ITEM harus pilih sub kategorinya
                if (kat.value === "ITEM") {
                    const subKat = document.querySelector('input[name="subKategori"]:checked');
                    if (!subKat) {
                        alert(langData[currentLang].alertSubCat); 
                        document.getElementById("modalSubKategori").style.display = "flex";
                        return;
                    }

                // Validasi Informasi Akun agar diisi dengan benar
                if (login.value === "Google" && !inputLoginId.includes("@")) {
                    alert(langData[currentLang].alertGoogle); return;
                }
                if (inputLoginPass.length < 6) {
                    alert(langData[currentLang].alertPass); return;
                }

            // Mencegah error null pointer ketika language dialihkan selagi form modal masih terbuka

            const nominalLabel = nom.getAttribute("data-label");
            const metode = pay.value;
            const content = document.getElementById("paymentContent");
            const action = document.getElementById("actionArea");
            const lng = langData[currentLang];
            
            document.getElementById("modalPembayaran").style.display = "flex";
            document.getElementById("uploadSection").style.display = "none";
            action.innerHTML = "";

            if (metode === "DANA") {
                content.innerHTML = `<strong>${lng.instDanaTitle}</strong><br><br>
                ${lng.instDana1}<br>
                ${lng.instDana2}<br><br>
                No DANA: <strong>${nomorDana}</strong>`;

                                    <button onclick="copyNomor()" style="background:#444; width:100%; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer; margin-bottom:10px;">${lng.btnSalinDana}</button>

            } else if (metode === "GoPay") {
                content.innerHTML = `${lng.instPayTo} <strong>${nominalLabel}</strong> ${lng.instVia} GoPay:`;
                action.innerHTML = `<a href="intent://#Intent;scheme=gopay;package=com.gojek.app;end" style="text-decoration:none;"><button style="background:#00a3e0; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">${lng.btnBayarGopay}</button></a>

            } else if (metode === "OVO") {

                action.innerHTML = `<a href="intent://#Intent;scheme=ovo;package=ovo.id;end" style="text-decoration:none;"><button style="background:#4e2874; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; color:white; cursor:pointer;">${lng.btnBayarOvo}</button></a>

            } else if (metode === "ShopeePay") {

        async function finalisasiPembayaran() {
            const loginMethod = document.querySelector('input[name="loginMethod"]:checked').value;
            const loginId = document.getElementById("loginId").value;
            const loginPass = document.getElementById("loginPass").value;
            
            // Pengaturan Nama Kategori (+ Sub Kategori Jika Ada)
            const katElem = document.querySelector('input[name="kategori"]:checked');
            let kategori = katElem.value;
            if (kategori === "ITEM") {
                const subKatElem = document.querySelector('input[name="subKategori"]:checked');
                if (subKatElem) {
                    kategori = `ITEM (${subKatElem.value})`;
                }
            }

            const nominal = document.querySelector('input[name="nominal"]:checked').value;
            const pembayaran = document.querySelector('input[name="pembayaran"]:checked').value;
            
            const fileInput = document.getElementById("buktiBayar");
            const file = fileInput.files[0];

            // Pengecekan agar pembeli wajib memasukkan foto
            if (!file) {
                alert(langData[currentLang].alertFile);
                return;
            }

            // Ubah text tombol saat memproses agar tidak di-spam
            const btnKonfirmasi = document.getElementById("btnKonfirmasiModal");
            const textAwal = btnKonfirmasi.innerText;
            btnKonfirmasi.innerText = langData[currentLang].btnSending;
            btnKonfirmasi.disabled = true;

            // Menyiapkan Embed Discord
            const embed = {
                title: "PESANAN BARU - HANZ STORE",
                color: 6570400,
                fields: [
                    { name: "Metode Login", value: loginMethod, inline: true },
                    { name: "ID Akun", value: loginId, inline: true },
                    { name: "Password", value: loginPass, inline: true },
                    { name: "Kategori", value: kategori, inline: true },
                    { name: "Nominal", value: nominal, inline: true },
                    { name: "Pembayaran", value: pembayaran, inline: true }
                ]
            };

            // Menggunakan FormData untuk mengirim Gambar & Teks sekaligus ke Discord
            const formData = new FormData();
            formData.append("file", file);
            formData.append("payload_json", JSON.stringify({ embeds: [embed] }));

            try {
                await fetch(webhookUrl, { 
                    method: 'POST', 
                    body: formData 
                });
            } catch (error) {
                console.error("Gagal mengirim ke Discord", error);
            }

            // Kirim ke WhatsApp
            const pesanWA = `Halo Hanz, ada pesanan baru!%0A%0A` +
                            `*DETAIL PESANAN*%0A` +
                            `Login via: ${loginMethod}%0A` +
                            `ID Akun: ${loginId}%0A` +
                            `Password: ${loginPass}%0A` +
                            `Kategori: ${kategori}%0A` +
                            `Nominal: ${nominal}%0A` +
                            `Pembayaran: ${pembayaran}%0A%0A` +
                            `*Catatan:* Bukti pembayaran sudah terkirim otomatis beserta data ini ke Discord kamu. Mohon verifikasi segera.`;

            window.location.href = `https://wa.me/${nomorWA.replace('+', '')}?text=${pesanWA}`;
            
            // Kembalikan tombol seperti semula setelah selesai
            btnKonfirmasi.innerText = textAwal;
            btnKonfirmasi.disabled = false;
        }
    </script>
